[build]
base = "frontend"
publish = "frontend/build"
command = "npm run build"

[build.environment]
# Set this in Netlify UI to your Railway backend URL, e.g. https://your-app.up.railway.app
# REACT_APP_API_URL = ""
GENERATE_SOURCEMAP = "false"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200