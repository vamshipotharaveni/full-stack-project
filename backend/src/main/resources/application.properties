# Local H2 Database Configuration (default)
spring.datasource.url=jdbc:h2:mem:rentalfinder;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# To use MySQL, set env vars and override these properties
# spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/rentalfinder}
# spring.datasource.username=${MYSQLUSER:root}
# spring.datasource.password=${MYSQLPASSWORD:password}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration for Frontend
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Application Configuration
spring.application.name=rental-finder-backend