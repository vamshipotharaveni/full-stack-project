# Datasource configuration (env-driven; falls back to H2 for local dev)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:rentalfinder;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${MYSQLUSER:sa}
spring.datasource.password=${MYSQLPASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration for Frontend
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Application Configuration
spring.application.name=rental-finder-backend